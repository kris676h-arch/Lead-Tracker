<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Nordic – Leads Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DED8;
    --border-strong: #C8C3BB;
    --text: #1A1814;
    --text-muted: #7A7570;
    --text-faint: #B0ABA5;
    --accent: #2C3E50;
    --accent-light: #E8ECF0;
    --green: #1B6B45;
    --green-bg: #E8F5EE;
    --amber: #8B5E0A;
    --amber-bg: #FEF3DA;
    --red: #8B1A1A;
    --red-bg: #FDEAEA;
    --purple: #4A2D8B;
    --purple-bg: #EDE8F8;
    --blue: #1A3F6B;
    --blue-bg: #E8EFF8;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--accent);
    color: white;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .header-logo span {
    opacity: 0.5;
    margin: 0 8px;
  }
  .header-sub { font-size: 12px; opacity: 0.6; }

  /* API Key bar */
  .api-bar {
    background: var(--accent-light);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .api-bar label { font-size: 12px; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
  .api-bar input {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    width: 340px;
    max-width: 100%;
  }
  .api-bar input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .api-status { font-size: 11px; padding: 4px 10px; border-radius: 99px; font-weight: 500; }
  .api-ok { background: var(--green-bg); color: var(--green); }
  .api-missing { background: var(--amber-bg); color: var(--amber); }

  /* Main layout */
  .main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.03em; margin-bottom: 4px; }
  .stat-val { font-size: 26px; font-weight: 300; line-height: 1; }

  /* Toolbar */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; gap: 8px; align-items: center; flex: 1; flex-wrap: wrap; }
  .toolbar-right { display: flex; gap: 8px; }

  input[type=search], select.filter-sel {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
  }
  input[type=search] { width: 220px; }
  input[type=search]:focus, select.filter-sel:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

  button.btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text);
    transition: background 0.15s;
    white-space: nowrap;
  }
  button.btn:hover { background: var(--bg); }
  button.btn-primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  button.btn-primary:hover { background: #1a252f; }
  button.btn-sm {
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 5px;
  }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 1100px; }
  thead th {
    background: var(--accent);
    color: rgba(255,255,255,0.85);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 10px;
    text-align: left;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.08);
  }
  thead th:last-child { border-right: none; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAF8; }
  tbody tr:nth-child(even) { background: #FDFCFA; }
  tbody tr:nth-child(even):hover { background: #F7F6F3; }
  td { padding: 7px 10px; vertical-align: middle; }

  td input[type=text], td input[type=email] {
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    width: 100%;
    padding: 4px 6px;
    border: 1px solid transparent;
    border-radius: 5px;
    background: transparent;
    color: var(--text);
  }
  td input[type=text]:hover, td input[type=email]:hover { border-color: var(--border); background: var(--bg); }
  td input[type=text]:focus, td input[type=email]:focus { border-color: var(--accent); background: var(--surface); outline: none; }

  td select.status-sel {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 99px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }

  .readonly { color: var(--text-muted); font-size: 12px; }
  .date-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }

  .badge {
    display: inline-block;
    font-size: 10.5px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .b-wait  { background: var(--amber-bg);  color: var(--amber); }
  .b-sent  { background: var(--green-bg);  color: var(--green); }
  .b-rej   { background: var(--red-bg);    color: var(--red); }
  .b-fup   { background: var(--purple-bg); color: var(--purple); }
  .b-cust  { background: var(--blue-bg);   color: var(--blue); }

  .ai-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .ai-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .ai-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .ai-btn.loading { opacity: 0.5; }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-faint);
    font-size: 16px;
    line-height: 1;
    padding: 3px 5px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .del-btn:hover { color: var(--red); background: var(--red-bg); }

  /* Status bar */
  .statusbar {
    margin-top: 14px;
    font-size: 11.5px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 20px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: none; }
  .dot.visible { display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .dot.pulsing { animation: pulse 1s infinite; background: var(--amber); }

  /* Notes modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 24px;
    width: 480px;
    max-width: 95vw;
    border: 1px solid var(--border);
  }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .modal textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    height: 120px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 10px;
    resize: vertical;
    background: var(--bg);
    color: var(--text);
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

  /* Empty state */
  .empty-row td {
    text-align: center;
    padding: 40px;
    color: var(--text-faint);
    font-size: 13px;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .header, .api-bar, .main { padding-left: 16px; padding-right: 16px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    input[type=search] { width: 150px; }
  }
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-logo">House Nordic <span>|</span> Leads Tracker</div>
  </div>
  <div class="header-sub" id="save-indicator"></div>
</header>

<div class="api-bar">
  <label for="api-key-input">Claude API-nøgle</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" oninput="onApiKeyChange()" />
  <span class="api-status" id="api-status-badge">Ikke angivet</span>
  <span style="font-size:11px;color:var(--text-muted);">Gemmes lokalt i browseren. Bruges kun til AI-opslag.</span>
</div>

<div class="main">

  <div class="stats" id="stats-row"></div>

  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn btn-primary" onclick="addRow()">+ Nyt lead</button>
      <input type="search" id="search-input" placeholder="Søg..." oninput="renderTable()" />
      <select class="filter-sel" id="filter-status" onchange="renderTable()">
        <option value="">Alle statusser</option>
        <option>Afventer svar</option>
        <option>Tilbud accepteret</option>
        <option>Afvist</option>
        <option>Opfølgning</option>
        <option>Kunde</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button class="btn" onclick="exportCSV()">CSV</button>
      <button class="btn" onclick="exportExcel()">Excel</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:32px;">#</th>
          <th style="min-width:140px;">Virksomhed</th>
          <th style="min-width:120px;">Kontaktperson</th>
          <th style="min-width:170px;">Email</th>
          <th style="min-width:90px;">Land</th>
          <th style="min-width:60px;">Butikker</th>
          <th style="min-width:120px;">Omsætning (EUR)</th>
          <th style="min-width:130px;">Tilbud sendt</th>
          <th style="min-width:90px;">Kontaktet</th>
          <th style="min-width:110px;">Status</th>
          <th style="min-width:70px;">AI opslag</th>
          <th style="min-width:50px;">Noter</th>
          <th style="width:30px;"></th>
        </tr>
      </thead>
      <tbody id="leads-body"></tbody>
    </table>
  </div>

  <div class="statusbar">
    <div class="dot" id="status-dot"></div>
    <span id="statusbar-msg"></span>
  </div>

</div>

<!-- Notes modal -->
<div class="modal-bg" id="notes-modal">
  <div class="modal">
    <h3>Noter</h3>
    <textarea id="notes-textarea" placeholder="Skriv noter om dette lead..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeNotes()">Annuller</button>
      <button class="btn btn-primary" onclick="saveNotes()">Gem</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const STORAGE_KEY = "hn_leads_v3";
const API_KEY_STORAGE = "hn_api_key";

let leads = [];
let notesEditIndex = null;
let saveTimeout = null;

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  const savedKey = localStorage.getItem(API_KEY_STORAGE) || "";
  document.getElementById("api-key-input").value = savedKey;
  updateApiStatus(savedKey);

  const raw = localStorage.getItem(STORAGE_KEY);
  leads = raw ? JSON.parse(raw) : defaultLeads();
  renderStats();
  renderTable();
}

function defaultLeads() {
  return [{
    id: uid(), company: "Kalopetris Furniture", contact: "Nikos Kalopetris",
    email: "nikos@kalopetris.gr", country: "Grækenland", stores: "2",
    revenue: "~500.000", offer: "SS26 Wholesale Offer",
    contacted: today(), status: "Afventer svar", notes: "Premium møbelbutik på Rhodos. Hotel-segment.", aiDone: true
  }];
}

function uid() { return Math.random().toString(36).slice(2, 10); }
function today() {
  return new Date().toLocaleDateString("da-DK", { day: "2-digit", month: "2-digit", year: "numeric" });
}

// ── Persistence ───────────────────────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  clearTimeout(saveTimeout);
  const ind = document.getElementById("save-indicator");
  ind.textContent = "Gemt";
  saveTimeout = setTimeout(() => ind.textContent = "", 1500);
}

function onApiKeyChange() {
  const key = document.getElementById("api-key-input").value.trim();
  localStorage.setItem(API_KEY_STORAGE, key);
  updateApiStatus(key);
}

function updateApiStatus(key) {
  const badge = document.getElementById("api-status-badge");
  if (key && key.startsWith("sk-ant")) {
    badge.textContent = "Nøgle gemt";
    badge.className = "api-status api-ok";
  } else {
    badge.textContent = "Ikke angivet";
    badge.className = "api-status api-missing";
  }
}

function getApiKey() { return document.getElementById("api-key-input").value.trim(); }

// ── Status helpers ────────────────────────────────────────────────────────
function setMsg(msg, pulsing = false) {
  document.getElementById("statusbar-msg").textContent = msg;
  const dot = document.getElementById("status-dot");
  dot.className = "dot" + (msg ? " visible" : "") + (pulsing ? " pulsing" : "");
}

// ── Stats ─────────────────────────────────────────────────────────────────
function renderStats() {
  const total = leads.length;
  const pending = leads.filter(l => l.status === "Afventer svar").length;
  const accepted = leads.filter(l => l.status === "Tilbud accepteret").length;
  const followup = leads.filter(l => l.status === "Opfølgning").length;
  const customers = leads.filter(l => l.status === "Kunde").length;
  document.getElementById("stats-row").innerHTML = `
    <div class="stat"><div class="stat-label">Leads i alt</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Afventer svar</div><div class="stat-val">${pending}</div></div>
    <div class="stat"><div class="stat-label">Tilbud accepteret</div><div class="stat-val">${accepted}</div></div>
    <div class="stat"><div class="stat-label">Opfølgning</div><div class="stat-val">${followup}</div></div>
    <div class="stat"><div class="stat-label">Kunder</div><div class="stat-val">${customers}</div></div>
  `;
}

// ── Table ─────────────────────────────────────────────────────────────────
function badgeClass(s) {
  return ({ "Afventer svar": "b-wait", "Tilbud accepteret": "b-sent", "Afvist": "b-rej", "Opfølgning": "b-fup", "Kunde": "b-cust" })[s] || "b-wait";
}

function filtered() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const fs = document.getElementById("filter-status").value;
  return leads.filter(l => {
    const textMatch = !q || [l.company, l.contact, l.email, l.country, l.offer].some(f => (f || "").toLowerCase().includes(q));
    const statusMatch = !fs || l.status === fs;
    return textMatch && statusMatch;
  });
}

function renderTable() {
  const rows = filtered();
  const tbody = document.getElementById("leads-body");
  if (rows.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="13">Ingen leads endnu. Klik "+ Nyt lead" for at komme i gang.</td></tr>`;
    return;
  }
  tbody.innerHTML = "";
  rows.forEach((lead, vi) => {
    const ri = leads.indexOf(lead);
    const tr = document.createElement("tr");
    const hasNotes = lead.notes && lead.notes.trim().length > 0;
    tr.innerHTML = `
      <td style="color:var(--text-faint);text-align:center;font-size:11px;">${vi + 1}</td>
      <td><input type="text" value="${esc(lead.company)}" placeholder="Virksomhedsnavn" onchange="update(${ri},'company',this.value)" /></td>
      <td><input type="text" value="${esc(lead.contact)}" placeholder="Fuldt navn" onchange="update(${ri},'contact',this.value)" /></td>
      <td><input type="email" value="${esc(lead.email)}" placeholder="email@virksomhed.com" onchange="update(${ri},'email',this.value)" /></td>
      <td class="readonly">${esc(lead.country || "")}</td>
      <td class="readonly" style="text-align:center;">${esc(lead.stores || "")}</td>
      <td class="readonly">${esc(lead.revenue || "")}</td>
      <td><input type="text" value="${esc(lead.offer)}" placeholder="F.eks. SS26 tilbud" onchange="update(${ri},'offer',this.value)" /></td>
      <td class="date-cell">${esc(lead.contacted || "")}</td>
      <td>
        <select class="status-sel" onchange="update(${ri},'status',this.value)">
          ${["Afventer svar","Tilbud accepteret","Afvist","Opfølgning","Kunde"].map(s => `<option ${lead.status === s ? "selected" : ""}>${s}</option>`).join("")}
        </select>
      </td>
      <td>
        <button class="ai-btn" id="aib-${lead.id}" onclick="lookupAI(${ri})">${lead.aiDone ? "Opdater" : "Slå op"}</button>
      </td>
      <td style="text-align:center;">
        <button class="btn btn-sm" onclick="openNotes(${ri})" style="${hasNotes ? "background:var(--amber-bg);color:var(--amber);border-color:var(--amber-bg);" : ""}">
          ${hasNotes ? "Se" : "Tilf\xF8j"}
        </button>
      </td>
      <td><button class="del-btn" onclick="deleteRow(${ri})" title="Slet">&times;</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function esc(s) { return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;"); }

function update(i, field, val) {
  leads[i][field] = val;
  save();
  if (field === "status") renderStats();
}

function addRow() {
  leads.push({ id: uid(), company: "", contact: "", email: "", country: "", stores: "", revenue: "", offer: "", contacted: "", status: "Afventer svar", notes: "", aiDone: false });
  save();
  renderStats();
  renderTable();
  const inputs = document.querySelectorAll("#leads-body td input[type=text]");
  if (inputs.length) inputs[inputs.length - 5].focus();
}

function deleteRow(i) {
  if (!confirm(`Slet "${leads[i].company || "dette lead"}"?`)) return;
  leads.splice(i, 1);
  save();
  renderStats();
  renderTable();
  setMsg("Lead slettet.");
}

// ── Notes modal ───────────────────────────────────────────────────────────
function openNotes(i) {
  notesEditIndex = i;
  document.getElementById("notes-textarea").value = leads[i].notes || "";
  document.getElementById("notes-modal").classList.add("open");
  document.getElementById("notes-textarea").focus();
}
function closeNotes() {
  document.getElementById("notes-modal").classList.remove("open");
  notesEditIndex = null;
}
function saveNotes() {
  if (notesEditIndex === null) return;
  leads[notesEditIndex].notes = document.getElementById("notes-textarea").value;
  save();
  renderTable();
  closeNotes();
}
document.getElementById("notes-modal").addEventListener("click", function(e) {
  if (e.target === this) closeNotes();
});

// ── AI Lookup ─────────────────────────────────────────────────────────────
async function lookupAI(i) {
  const apiKey = getApiKey();
  if (!apiKey) {
    alert("Indsæt din Claude API-nøgle øverst på siden.");
    return;
  }
  const lead = leads[i];
  if (!lead.company && !lead.email) {
    setMsg("Udfyld virksomhedsnavn eller email først.");
    return;
  }

  const btn = document.getElementById("aib-" + lead.id);
  if (btn) { btn.disabled = true; btn.textContent = "Søger..."; btn.classList.add("loading"); }
  setMsg("Søger data for " + (lead.company || lead.email) + "...", true);

  const domain = lead.email ? lead.email.split("@")[1] : "";
  const prompt = `You are a B2B research assistant for a Scandinavian furniture brand. Research this company using web search and return ONLY a valid JSON object with exactly these fields:
- country: country name in Danish (e.g. "Danmark", "Polen", "Frankrig", "Grækenland", "Spanien", "Kroatien", "Sverige")
- stores: estimated number of physical retail locations as a short string (e.g. "1", "3", "5-10", "20+", "Ukendt")
- revenue: estimated annual revenue in EUR as a short string (e.g. "~200.000", "~1.000.000", "~5.000.000", "Ukendt")
- contacted_date: today's date in Danish format DD.MM.YYYY

Company name: ${lead.company || "unknown"}
Email domain: ${domain || "unknown"}
Contact person: ${lead.contact || "unknown"}

Return ONLY the JSON object. No markdown, no explanation, no code fences.`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-opus-4-5",
        max_tokens: 300,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || "API-fejl " + resp.status);
    }

    const data = await resp.json();
    const textBlock = data.content.find(b => b.type === "text");
    if (!textBlock) throw new Error("Intet svar fra API.");

    const raw = textBlock.text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(raw);

    leads[i].country   = parsed.country || "Ukendt";
    leads[i].stores    = parsed.stores || "Ukendt";
    leads[i].revenue   = parsed.revenue || "Ukendt";
    leads[i].contacted = parsed.contacted_date || today();
    leads[i].aiDone    = true;

    save();
    setMsg("Data hentet for " + (lead.company || lead.email) + ".");
  } catch (e) {
    setMsg("Fejl: " + e.message);
  }

  renderStats();
  renderTable();
}

// ── Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  const hdr = ["Virksomhed","Kontaktperson","Email","Land","Butikker","Omsætning (EUR)","Tilbud sendt","Kontaktet","Status","Noter"];
  const rows = leads.map(l => [l.company,l.contact,l.email,l.country,l.stores,l.revenue,l.offer,l.contacted,l.status,l.notes]
    .map(v => `"${(v || "").replace(/"/g, '""')}"`).join(","));
  const csv = "\uFEFF" + [hdr.join(","), ...rows].join("\n");
  dl(new Blob([csv], { type: "text/csv;charset=utf-8;" }), "HN_Leads.csv");
  setMsg("CSV eksporteret.");
}

function exportExcel() {
  const hdr = ["Virksomhed","Kontaktperson","Email","Land","Butikker","Omsætning (EUR)","Tilbud sendt","Kontaktet","Status","Noter"];
  const rows = leads.map(l => [l.company,l.contact,l.email,l.country,l.stores,l.revenue,l.offer,l.contacted,l.status,l.notes]);
  const ws = XLSX.utils.aoa_to_sheet([hdr, ...rows]);
  ws["!cols"] = [26,18,28,12,10,16,24,12,16,30].map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Leads");
  XLSX.writeFile(wb, "HN_Leads_Tracker.xlsx");
  setMsg("Excel eksporteret.");
}

function dl(blob, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

// ── Start ─────────────────────────────────────────────────────────────────
init();
</script>
