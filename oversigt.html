<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Nordic – Samlet oversigt</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#F7F5F0;--surface:#fff;--border:#E2DED8;--border-strong:#C8C3BB;--text:#1A1814;--text-muted:#7A7570;--text-faint:#B0ABA5;--accent:#2C3E50;--green:#1B6B45;--green-bg:#E8F5EE;--amber:#8B5E0A;--amber-bg:#FEF3DA;--red:#8B1A1A;--red-bg:#FDEAEA;--purple:#4A2D8B;--purple-bg:#EDE8F8;--blue:#1A3F6B;--blue-bg:#E8EFF8;--radius:8px;--radius-lg:12px; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
  .header{background:var(--accent);color:white;padding:0 20px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;}
  .header-logo{font-size:15px;font-weight:500;letter-spacing:.04em;text-decoration:none;color:white;}
  .header-logo span{opacity:.5;margin:0 8px;}
  .main{padding:20px;}
  .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:24px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;}
  .stat-label{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.03em;margin-bottom:4px;}
  .stat-val{font-size:26px;font-weight:300;}
  .toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  input[type=search],select.fs{font-family:"DM Sans",sans-serif;font-size:13px;padding:8px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);}
  input[type=search]{width:200px;}
  button.btn{font-family:"DM Sans",sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);color:var(--text);white-space:nowrap;}
  button.btn:hover{background:var(--bg);}
  button.btn-primary{background:var(--accent);color:white;border-color:var(--accent);}
  button.btn-primary:hover{background:#1a252f;}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{background:var(--accent);color:rgba(255,255,255,.85);font-size:10.5px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:8px 8px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
  thead th:hover{background:#3d5166;}
  tbody tr{border-bottom:1px solid var(--border);}
  tbody tr:hover{background:#FAFAF8;}
  tbody tr:nth-child(even){background:#FDFCFA;}
  td{padding:7px 8px;vertical-align:middle;font-size:12px;}
  .badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;}
  .b-lead{background:var(--purple-bg);color:var(--purple);}
  .b-kunde{background:var(--blue-bg);color:var(--blue);}
  .b-wait{background:var(--amber-bg);color:var(--amber);}
  .b-sent{background:var(--green-bg);color:var(--green);}
  .b-rej{background:var(--red-bg);color:var(--red);}
  .b-fup{background:#FEE2E2;color:#991B1B;}
  .sort-icon{font-size:10px;opacity:.7;margin-left:2px;}
  .person-tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:99px;background:#E8ECF0;color:#2C3E50;}
  .empty{text-align:center;padding:40px;color:var(--text-faint);font-size:13px;}
  .lock-screen{position:fixed;inset:0;background:#F7F5F0;z-index:9999;display:flex;align-items:center;justify-content:center;}
  .lock-card{background:white;border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 48px;width:360px;text-align:center;}
  .lock-logo{font-size:15px;font-weight:500;color:var(--accent);letter-spacing:.04em;margin-bottom:8px;}
  .lock-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;}
  .lock-input{width:100%;font-family:"DM Mono",monospace;font-size:18px;letter-spacing:.15em;text-align:center;padding:12px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg);color:var(--text);margin-bottom:12px;}
  .lock-input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  .lock-btn{width:100%;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;padding:11px;border-radius:var(--radius);background:var(--accent);color:white;border:none;cursor:pointer;}
  .lock-btn:hover{background:#1a252f;}
  .lock-error{font-size:12px;color:var(--red);min-height:18px;margin-top:8px;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(44,62,80,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="lock-screen" id="lock-screen">
  <div class="lock-card">
    <div style="font-size:32px;margin-bottom:16px;">🔒</div>
    <div class="lock-logo">House Nordic</div>
    <div class="lock-sub">Samlet oversigt &mdash; Indtast adgangskode</div>
    <input type="password" class="lock-input" id="lock-input" placeholder="&#9679;&#9679;&#9679;&#9679;" maxlength="20" onkeydown="if(event.key==='Enter')checkPassword()" />
    <button class="lock-btn" onclick="checkPassword()">Lås op</button>
    <div class="lock-error" id="lock-error"></div>
  </div>
</div>

<header class="header">
  <a href="index.html" class="header-logo">House Nordic <span>|</span> Samlet oversigt</a>
</header>

<div class="main">
  <div class="stats" id="stats-row"></div>
  <div class="toolbar">
    <input type="search" id="search-input" placeholder="Søg..." oninput="renderTable()" />
    <select class="fs" id="fp" onchange="renderTable()">
      <option value="">Alle sælgere</option>
      <option>Kristian</option><option>Laura</option><option>Johan</option><option>Nicolai</option><option>Rasmus</option><option>Mikkel</option><option>Hans Henrik</option><option>Kasper</option>
    </select>
    <select class="fs" id="ft" onchange="renderTable()">
      <option value="">Lead &amp; Kunde</option>
      <option>Lead</option><option>Kunde</option>
    </select>
    <select class="fs" id="fs2" onchange="renderTable()">
      <option value="">Alle statusser</option>
      <option>Afventer svar</option><option>Tilbud accepteret</option>
      <option>Opfølgning</option><option>Afvist</option>
    </select>
    <button class="btn" onclick="exportCSV()">CSV</button>
    <button class="btn btn-primary" onclick="exportExcel()">Excel</button>
  </div>
  <div id="loading" style="text-align:center;padding:30px;color:var(--text-muted);"><span class="spinner"></span> Henter alle leads...</div>
  <div class="table-wrap" id="table-section" style="display:none;">
    <table>
      <thead><tr>
        <th onclick="ts('person')">Sælger<span class="sort-icon" id="sort-person"></span></th>
        <th onclick="ts('company')">Virksomhed<span class="sort-icon" id="sort-company"></span></th>
        <th onclick="ts('contact')">Kontaktperson<span class="sort-icon" id="sort-contact"></span></th>
        <th onclick="ts('email')">Email<span class="sort-icon" id="sort-email"></span></th>
        <th onclick="ts('country')">Land<span class="sort-icon" id="sort-country"></span></th>
        <th onclick="ts('stores')">Butikker<span class="sort-icon" id="sort-stores"></span></th>
        <th onclick="ts('revenue')">Omsætning<span class="sort-icon" id="sort-revenue"></span></th>
        <th onclick="ts('fair')">Messe<span class="sort-icon" id="sort-fair"></span></th>
        <th onclick="ts('season')">Sæson<span class="sort-icon" id="sort-season"></span></th>
        <th onclick="ts('offer')">Tilbud sendt<span class="sort-icon" id="sort-offer"></span></th>
        <th onclick="ts('contacted')">Kontaktet<span class="sort-icon" id="sort-contacted"></span></th>
        <th onclick="ts('type')">Type<span class="sort-icon" id="sort-type"></span></th>
        <th onclick="ts('status')">Status<span class="sort-icon" id="sort-status"></span></th>
      </tr></thead>
      <tbody id="leads-body"></tbody>
    </table>
  </div>
  <div style="margin-top:10px;font-size:11.5px;color:var(--text-muted);" id="statusbar"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const PASSWORD = "2035";
const SESSION_KEY = "hn_auth_oversigt";

const SUPABASE_URL = "https://vjnyxxgialsbicjxzylu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqbnl4eGdpYWxzYmljanh6eWx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDY0NzEsImV4cCI6MjA4OTQyMjQ3MX0.DuOgdXZMexkC7tU2nfGbTXuTY6e6wTEkttSORdI_ZgQ";
async function sbFetch(method, path, body) {
  const opts = { method, headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer "+SUPABASE_KEY, "Content-Type": "application/json", "Prefer": method==="POST"?"return=representation":"" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL+path, opts);
  if (!r.ok) { const e=await r.text(); throw new Error(e); }
  const t=await r.text(); return t?JSON.parse(t):[];
}


let allLeads = [], sortCol = null, sortDir = "desc";

function checkPassword() {
  if (document.getElementById("lock-input").value === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY,"true");
    document.getElementById("lock-screen").style.display="none";
    loadAll();
  } else {
    document.getElementById("lock-error").textContent="Forkert adgangskode.";
    document.getElementById("lock-input").value="";
    document.getElementById("lock-input").focus();
  }
}

async function loadAll() {
  try {
    allLeads = await sbFetch("GET","/rest/v1/leads?order=person.asc,created_at.asc&select=*",null);
    document.getElementById("loading").style.display="none";
    document.getElementById("table-section").style.display="block";
    renderStats(); renderTable();
  } catch(e) { document.getElementById("statusbar").textContent="Fejl: "+e.message; }
}

function renderStats() {
  const t=allLeads.length, lc=allLeads.filter(l=>(l.type||"Lead")==="Lead").length;
  const cc=allLeads.filter(l=>l.type==="Kunde").length, p=allLeads.filter(l=>l.status==="Afventer svar").length;
  const f=allLeads.filter(l=>l.status==="Opfølgning").length;
  document.getElementById("stats-row").innerHTML=`
    <div class="stat"><div class="stat-label">I alt</div><div class="stat-val">${t}</div></div>
    <div class="stat"><div class="stat-label">Leads</div><div class="stat-val">${lc}</div></div>
    <div class="stat"><div class="stat-label">Kunder</div><div class="stat-val">${cc}</div></div>
    <div class="stat"><div class="stat-label">Afventer svar</div><div class="stat-val">${p}</div></div>
    <div class="stat"><div class="stat-label">Opfølgning</div><div class="stat-val">${f}</div></div>`;
}

function parseRev(r){ if(!r)return -1; const n=parseFloat(r.toString().replace(/~/g,"").replace(/\./g,"").replace(/,/g,".").replace(/[^0-9.]/g,"")); return isNaN(n)?-1:n; }
function fmtRev(r){ if(!r)return ""; const n=parseRev(r); if(n<0)return r; if(n>=1e9)return "~"+(n/1e9).toFixed(1).replace(/\.0$/,"")+" mia."; if(n>=1e6)return "~"+(n/1e6).toFixed(1).replace(/\.0$/,"")+" mio."; if(n>=1e3)return "~"+(n/1e3).toFixed(0)+" t."; return "~"+n.toFixed(0); }

function ts(col){
  sortCol===col?sortDir=sortDir==="desc"?"asc":"desc":(sortCol=col,sortDir="desc");
  document.querySelectorAll(".sort-icon").forEach(e=>e.textContent="");
  const ic=document.getElementById("sort-"+col); if(ic)ic.textContent=sortDir==="desc"?" ▼":" ▲";
  renderTable();
}

function filtered(){
  const q=document.getElementById("search-input").value.toLowerCase();
  const fp=document.getElementById("fp").value, ft=document.getElementById("ft").value, fs=document.getElementById("fs2").value;
  let r=allLeads.filter(l=>{
    const m=!q||[l.company,l.contact,l.email,l.country,l.offer,l.person].some(f=>(f||"").toLowerCase().includes(q));
    return m&&(!fp||l.person===fp)&&(!ft||(l.type||"Lead")===ft)&&(!fs||l.status===fs);
  });
  if(sortCol) r=r.slice().sort((a,b)=>{
    let av=a[sortCol]||"",bv=b[sortCol]||"";
    if(sortCol==="revenue"||sortCol==="stores"){av=parseRev(av);bv=parseRev(bv);return sortDir==="desc"?bv-av:av-bv;}
    av=av.toString().toLowerCase();bv=bv.toString().toLowerCase();
    return sortDir==="desc"?bv.localeCompare(av,"da"):av.localeCompare(bv,"da");
  });
  return r;
}

function sBadge(s){ const m={"Afventer svar":"b-wait","Tilbud accepteret":"b-sent","Opfølgning":"b-fup","Afvist":"b-rej"}; return `<span class="badge ${m[s]||"b-wait"}">${s||""}</span>`; }

function renderTable(){
  const rows=filtered(), tbody=document.getElementById("leads-body");
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="13" class="empty">Ingen leads fundet.</td></tr>`;return;}
  tbody.innerHTML="";
  rows.forEach(l=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td><span class="person-tag">${l.person}</span></td>
      <td>${l.company||""}</td>
      <td>${l.contact||""}</td>
      <td style="color:var(--text-muted);font-size:11px;">${l.email||""}</td>
      <td>${l.country||""}</td>
      <td style="text-align:center;">${l.stores||""}</td>
      <td style="color:var(--text-muted);">${fmtRev(l.revenue)}</td>
      <td>${l.fair||""}</td>
      <td>${l.season||""}</td>
      <td>${l.offer||""}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);">${l.contacted||""}</td>
      <td><span class="badge ${(l.type||"Lead")==="Kunde"?"b-kunde":"b-lead"}">${l.type||"Lead"}</span></td>
      <td>${sBadge(l.status)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function exportCSV(){
  const hdr=["Sælger","Virksomhed","Kontaktperson","Email","Land","Butikker","Omsætning","Messe","Sæson","Tilbud sendt","Kontaktet","Type","Status"];
  const rows=filtered().map(l=>[l.person,l.company,l.contact,l.email,l.country,l.stores,l.revenue,l.fair||"",l.season||"",l.offer,l.contacted,l.type||"Lead",l.status].map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","));
  const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob(["\uFEFF"+[hdr.join(","),...rows].join("\n"),{type:"text/csv;charset=utf-8;"}])); a.download="HN_Leads_Samlet.csv"; a.click();
}

function exportExcel(){
  const hdr=["Sælger","Virksomhed","Kontaktperson","Email","Land","Butikker","Omsætning","Messe","Sæson","Tilbud sendt","Kontaktet","Type","Status"];
  const rows=filtered().map(l=>[l.person,l.company,l.contact,l.email,l.country,l.stores,l.revenue,l.fair||"",l.season||"",l.offer,l.contacted,l.type||"Lead",l.status]);
  const ws=XLSX.utils.aoa_to_sheet([hdr,...rows]);
  ws["!cols"]=[14,22,18,26,12,10,14,14,10,22,12,10,16].map(w=>({'wch':w}));
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Samlet");
  XLSX.writeFile(wb,"HN_Leads_Samlet.xlsx");
}

if(sessionStorage.getItem(SESSION_KEY)==="true"){document.getElementById("lock-screen").style.display="none";loadAll();}
else{setTimeout(()=>document.getElementById("lock-input").focus(),100);}
</script>
</body>
</html>
